<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🛡️ Vista de Administrador</title>
<style>
  body {
    margin: 0;
    font-family: 'Inter', Arial, sans-serif;
    background: #0d1b2a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }
  .aviso {
    background: #e63946;
    color: #fff;
    font-weight: 800;
    padding: 10px 18px;
    border-radius: 10px;
    margin-bottom: 18px;
    text-align: center;
  }
  h1 {
    font-size: 1.2rem;
    color: #f4b400;
    margin-bottom: 4px;
  }
  .nombre {
    font-size: 2.4rem;
    font-weight: 800;
    text-align: center;
    margin: 16px 0;
    color: #2a9d4a;
  }
  .vacio {
    font-size: 1.3rem;
    opacity: 0.7;
    margin-top: 40px;
    text-align: center;
  }
  .pistas {
    width: 100%;
    max-width: 420px;
  }
  .pista {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 1.05rem;
    background: rgba(255,255,255,0.06);
    border-left: 5px solid #444;
  }
  .pista.revelada {
    border-left-color: #f4b400;
    background: rgba(244,180,0,0.12);
  }
  .estado-conexion {
    margin-top: auto;
    font-size: 0.85rem;
    opacity: 0.6;
    padding-top: 30px;
    text-align: center;
  }
  .seccion {
    width: 100%;
    max-width: 460px;
    border-top: 2px solid rgba(255,255,255,0.15);
    padding-top: 18px;
    margin-top: 18px;
  }
  .seccion h2 {
    font-size: 1rem;
    color: #f4b400;
    text-align: center;
    margin: 0 0 10px;
  }
  .palabra-mimica {
    font-size: 2rem;
    font-weight: 800;
    text-align: center;
    color: #ff5d8f;
    margin: 10px 0;
  }
</style>
</head>
<body>
  <div class="aviso">⚠️ NO proyectes esta ventana — solo para el anfitrión</div>
  <h1>🛡️ VISTA DE ADMINISTRADOR</h1>

  <div class="seccion">
    <h2>🔎 Adivina el Jugador</h2>
    <div id="contenido-jugador">
      <p class="vacio">Esperando a que se muestre un jugador...</p>
    </div>
  </div>

  <div class="seccion">
    <h2>🎭 Mímica de Acciones</h2>
    <div id="contenido-mimica">
      <p class="vacio">Esperando a que se asigne una palabra...</p>
    </div>
  </div>

  <p class="estado-conexion" id="estado-conexion"></p>

<script>
  const CLAVE_ADMIN_JUGADOR = "diaDelPadreFutbol_adminJugador_v1";
  const CLAVE_ADMIN_MIMICA = "diaDelPadreFutbol_adminMimica_v1";

  function renderJugador(data) {
    const cont = document.getElementById("contenido-jugador");
    if (!data || !data.nombre) {
      cont.innerHTML = '<p class="vacio">Esperando a que se muestre un jugador...</p>';
      return;
    }
    const pistasHtml = data.pistas.map((p, i) => {
      const revelada = i < data.pistasMostradas;
      return `<div class="pista ${revelada ? "revelada" : ""}">${revelada ? "✅" : "⬜"} Pista ${i + 1}: ${p}</div>`;
    }).join("");
    cont.innerHTML = `
      <div class="nombre">${data.nombre}</div>
      <p style="text-align:center;">Pistas reveladas al público: ${data.pistasMostradas} de ${data.pistas.length}</p>
      <div class="pistas">${pistasHtml}</div>
    `;
  }

  function renderMimica(data) {
    const cont = document.getElementById("contenido-mimica");
    if (!data || !data.palabra) {
      cont.innerHTML = '<p class="vacio">Esperando a que se asigne una palabra...</p>';
      return;
    }
    cont.innerHTML = `<div class="palabra-mimica">${data.palabra}</div>`;
  }

  function leerClave(clave) {
    try {
      const raw = localStorage.getItem(clave);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function actualizarTodo() {
    renderJugador(leerClave(CLAVE_ADMIN_JUGADOR));
    renderMimica(leerClave(CLAVE_ADMIN_MIMICA));
  }

  actualizarTodo();

  window.addEventListener("storage", (e) => {
    if (e.key === CLAVE_ADMIN_JUGADOR || e.key === CLAVE_ADMIN_MIMICA) {
      actualizarTodo();
    }
  });

  // Respaldo: si el navegador no dispara "storage" entre ventanas (poco común), se reintenta cada segundo.
  setInterval(actualizarTodo, 1000);

  document.getElementById("estado-conexion").textContent =
    "Esta ventana se actualiza automáticamente. Mantenla en tu pantalla, fuera de la vista del público.";
</script>
</body>
</html>
